<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f1923;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <!-- Gold accent line -->
  <rect x="0" y="0" width="1200" height="4" fill="#c8a55c" />
  <!-- Company name -->
  <text x="100" y="260" font-family="Georgia, serif" font-size="60" font-weight="bold" fill="#ffffff" letter-spacing="1">Rising Tide</text>
  <text x="100" y="320" font-family="Georgia, serif" font-size="38" fill="rgba(255,255,255,0.7)" letter-spacing="2">Property Group</text>
  <!-- Tagline -->
  <text x="100" y="400" font-family="Georgia, serif" font-size="24" fill="#c8a55c" font-style="italic">Real Assets. Real Partners.</text>
  <!-- Divider line -->
  <rect x="100" y="440" width="120" height="2" fill="#c8a55c" opacity="0.6" />
  <!-- Description -->
  <text x="100" y="490" font-family="Arial, sans-serif" font-size="20" fill="rgba(255,255,255,0.5)">Commercial Real Estate · Florida&apos;s Space Coast</text>
  <!-- URL -->
  <text x="100" y="570" font-family="Arial, sans-serif" font-size="16" fill="rgba(255,255,255,0.3)">risingtidepg.com</text>
  <!-- Bottom gold accent -->
  <rect x="0" y="626" width="1200" height="4" fill="#c8a55c" />
</svg>
